# SonarCloud project configuration
# https://docs.sonarsource.com/sonarqube-cloud/analyzing-source-code/languages/go/

sonar.projectKey=EmiyaKiritsugu3_sentinel-core
sonar.organization=emiyakiritsugu3

# Source and test paths
sonar.sources=.
sonar.tests=.
sonar.test.inclusions=**/*_test.go

# Exclusions — generated/vendor/web artifacts
sonar.exclusions=web/node_modules/**,web/dist/**,**/vendor/**,sentinel

# Go coverage report (generated by `go test -coverprofile`)
sonar.go.coverage.reportPaths=coverage.out

# SCM
sonar.scm.provider=git
